<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iStore 門市資料</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f2;
  --text2: #888896;
  --text3: #4a4a58;
  --accent: #5b7fff;
  --accent-dim: rgba(91,127,255,0.15);
  --success: #34c97a;
  --success-dim: rgba(52,201,122,0.15);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

.header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(15,15,17,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 0;
  padding-top: max(16px, env(safe-area-inset-top));
}

.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.header-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
  flex: 1;
}

/* ── 契客代號區塊 ── */
.sender-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.sender-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sender-top {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sender-store-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.2px;
}

.sender-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}

.sender-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.sender-code {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.3px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sender-copy-btn {
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.sender-copy-btn:active { transform: scale(0.94); }
.sender-copy-btn.copied {
  background: var(--success-dim);
  color: var(--success);
  border-color: rgba(52,201,122,0.3);
}

/* ── Search ── */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
  display: flex;
}
.search-box {
  width: 100%;
  font-family: inherit;
  font-size: 15px;
  padding: 10px 14px 10px 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.search-box::placeholder { color: var(--text3); }
.search-box:focus { outline: none; border-color: var(--accent); }

.region-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 14px;
  scrollbar-width: none;
}
.region-scroll::-webkit-scrollbar { display: none; }

.region-btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.18s;
}
.region-btn:active { opacity: 0.7; }
.region-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Content ── */
.content {
  padding: 16px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}

.count-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
  padding-left: 2px;
}

.list { display: flex; flex-direction: column; gap: 8px; }

.list-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.list-item.open { border-color: var(--border2); }

.list-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.list-header:active { background: var(--surface2); }

.store-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 6px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.list-item.open .store-badge { background: var(--accent-dim); color: var(--accent); }

.store-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  letter-spacing: -0.2px;
}

.chevron-wrap {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.25s;
}
.list-item.open .chevron-wrap { background: var(--accent-dim); transform: rotate(90deg); }
.chevron-wrap svg {
  width: 10px; height: 10px;
  fill: none; stroke: var(--text2);
  stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke 0.2s;
}
.list-item.open .chevron-wrap svg { stroke: var(--accent); }

.detail {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.detail.open { display: block; }

.copy-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
}
.copy-row + .copy-row { border-top: 1px solid var(--border); }

.copy-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  width: 30px;
  flex-shrink: 0;
}

.copy-value-wrap { flex: 1; min-width: 0; }
.copy-value { font-size: 15px; color: var(--text); letter-spacing: -0.1px; }
.copy-district { font-size: 12px; color: var(--text3); margin-top: 3px; }

.copy-btn {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  min-width: 60px;
  text-align: center;
  transition: all 0.15s;
}
.copy-btn:active { transform: scale(0.94); }
.copy-btn.copied {
  background: var(--success-dim);
  color: var(--success);
  border-color: rgba(52,201,122,0.3);
}

.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <span class="header-title">iStore 門市資料</span>
  </div>

  <div class="sender-section">
    <div class="sender-card">
      <div class="sender-top">
        <span class="sender-store-badge">75</span>
        <span class="sender-label">契客代號</span>
      </div>
      <div class="sender-bottom">
        <span class="sender-code">5376518715</span>
        <button class="sender-copy-btn" onclick="doCopy('5376518715', this)">複製</button>
      </div>
    </div>
    <div class="sender-card">
      <div class="sender-top">
        <span class="sender-store-badge">77</span>
        <span class="sender-label">契客代號</span>
      </div>
      <div class="sender-bottom">
        <span class="sender-code">5376518747</span>
        <button class="sender-copy-btn" onclick="doCopy('5376518747', this)">複製</button>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input class="search-box" type="search" placeholder="搜尋門市名稱或地址…" id="search" autocomplete="off" />
  </div>

  <div class="region-scroll" id="region-scroll"></div>
</div>

<div class="content">
  <div class="count-label" id="count-label"></div>
  <div class="list" id="list"></div>
</div>

<script>
const stores = [
  { id: 45,  name: 'iStore 南西',       region: '北一區', phone: '02-2521-2711', street: '南京西路15號2樓',         district: '台北市中山區' },
  { id: 47,  name: 'iStore 天母',       region: '北一區', phone: '02-2873-3308', street: '天母東路68號一館1樓',      district: '台北市士林區' },
  { id: 48,  name: 'iStore 台北站前',   region: '北一區', phone: '02-2361-5689', street: '忠孝西路一段66號2樓',      district: '台北市中正區' },
  { id: 51,  name: 'iStore 信義A11',    region: '北二區', phone: '02-8786-1011', street: '松壽路11號',              district: '台北市信義區' },
  { id: 57,  name: 'iStore 信義A4',     region: '北二區', phone: '02-2725-2018', street: '松高路19號B1',            district: '台北市信義區' },
  { id: 61,  name: 'iStore 桃園青埔',   region: '北二區', phone: '03-287-5208',  street: '春德路107號1樓',          district: '桃園市中壢區' },
  { id: 65,  name: 'iStore 桃園站前',   region: '北二區', phone: '03-331-2528',  street: '中正路19號1樓',           district: '桃園市桃園區' },
  { id: 75,  name: 'iStore 台中中港',   region: '中區',   phone: '04-2258-6095', street: '台灣大道三段301號2樓',     district: '台中市西屯區' },
  { id: 76,  name: 'iStore 台中中友',   region: '中區',   phone: '04-2229-5598', street: '三民路三段161號2樓(B棟)',  district: '台中市北區' },
  { id: 77,  name: 'iStore 台中三井',   region: '中區',   phone: '04-2656-3309', street: '臺灣大道十段166號1樓',     district: '台中市梧棲區' },
  { id: 81,  name: 'iStore 嘉義耐斯',   region: '中區',   phone: '05-276-5718',  street: '東區忠孝路600號1樓',       district: '嘉義市' },
  { id: 84,  name: 'iStore 嘉義垂楊',   region: '中區',   phone: '05-222-3685',  street: '西區垂楊路726號1樓',       district: '嘉義市' },
  { id: 86,  name: 'iStore 台南西門',   region: '台南區', phone: '06-303-0689',  street: '西門路一段658號1樓B區',    district: '台南市中西區' },
  { id: 88,  name: 'iStore 台南中山',   region: '台南區', phone: '06-222-2158',  street: '中山路162號2樓',          district: '台南市中西區' },
  { id: 89,  name: 'iStore 台南三井',   region: '台南區', phone: '06-303-3200',  street: '歸仁大道101號1樓',         district: '台南市歸仁區' },
  { id: 97,  name: 'iStore 台南小北門', region: '台南區', phone: '06-282-0518',  street: '西門路四段135號1樓',       district: '台南市北區' },
  { id: 115, name: 'iStore 高雄左營',   region: '高雄區', phone: '07-346-9850',  street: '高鐵路123號1樓',          district: '高雄市左營區' },
  { id: 116, name: 'iStore 高雄三多',   region: '高雄區', phone: '07-331-9218',  street: '三多三路213號B1',         district: '高雄市前鎮區' },
  { id: 117, name: 'iStore SKM Park',  region: '高雄區', phone: '07-791-8900',  street: '中安路1之1號',            district: '高雄市前鎮區' },
];

const regions = ['全部', '北一區', '北二區', '中區', '台南區', '高雄區'];
let currentRegion = '全部';
let openId = null;

const regionScroll = document.getElementById('region-scroll');
regions.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'region-btn' + (r === '全部' ? ' active' : '');
  btn.textContent = r;
  btn.onclick = () => setRegion(r);
  regionScroll.appendChild(btn);
});

function setRegion(r) {
  currentRegion = r;
  openId = null;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.toggle('active', b.textContent === r));
  render();
}

function toggleItem(id) {
  openId = openId === id ? null : id;
  render();
}

function doCopy(text, btn) {
  const done = () => {
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 1600);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback(text, done));
  } else {
    fallback(text, done);
  }
}

function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  cb();
}

const chevronSVG = `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = stores.filter(s => {
    const regionOk = currentRegion === '全部' || s.region === currentRegion;
    const searchOk = !q || s.name.toLowerCase().includes(q) || String(s.id).includes(q) || s.street.includes(q) || s.district.includes(q);
    return regionOk && searchOk;
  });

  document.getElementById('count-label').textContent = `${filtered.length} 間門市`;

  const listEl = document.getElementById('list');
  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty">沒有符合的門市</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(s => {
    const isOpen = openId === s.id;
    return `
      <div class="list-item ${isOpen ? 'open' : ''}">
        <div class="list-header" onclick="toggleItem(${s.id})">
          <span class="store-badge">${s.id}</span>
          <span class="store-name">${s.name}</span>
          <div class="chevron-wrap">${chevronSVG}</div>
        </div>
        <div class="detail ${isOpen ? 'open' : ''}">
          <div class="copy-row">
            <span class="copy-label">電話</span>
            <div class="copy-value-wrap">
              <div class="copy-value">${s.phone}</div>
            </div>
            <button class="copy-btn" onclick="doCopy('${s.phone}', this)">複製</button>
          </div>
          <div class="copy-row">
            <span class="copy-label">地址</span>
            <div class="copy-value-wrap">
              <div class="copy-value">${s.street}</div>
              <div class="copy-district">${s.district}</div>
            </div>
            <button class="copy-btn" onclick="doCopy('${s.street}', this)">複製</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', () => { openId = null; render(); });
render();
</script>
</body>
</html>
